name: E2E tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  e2e:
    name: Cucumber E2E (real server + DB)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: txosnabai
          POSTGRES_PASSWORD: txosnabai
          POSTGRES_DB: txosnabai
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://txosnabai:txosnabai@localhost:5432/txosnabai
      NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET || 'ci-e2e-test-secret-not-for-production' }}
      NEXTAUTH_URL: http://localhost:3000
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      PAYMENT_CREDENTIALS_KEY: ${{ secrets.PAYMENT_CREDENTIALS_KEY }}
      PLAYWRIGHT_BROWSERS_PATH: /home/runner/.cache/ms-playwright

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          run_install: false

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Verify Playwright browser
        run: |
          echo "PLAYWRIGHT_BROWSERS_PATH=$PLAYWRIGHT_BROWSERS_PATH"
          pnpm exec playwright --version
          find "$PLAYWRIGHT_BROWSERS_PATH" -maxdepth 3 -name 'chrome' -o -name 'headless_shell' 2>/dev/null || echo "WARNING: no chrome/headless_shell found under $PLAYWRIGHT_BROWSERS_PATH"

      - name: Apply database migrations
        run: pnpm prisma migrate deploy

      - name: Build
        run: pnpm build

      - name: Start server
        run: pnpm start &

      - name: Wait for server
        run: npx wait-on http://localhost:3000 --timeout 30000

      - name: Run E2E tests
        run: pnpm test:e2e --format json:/tmp/e2e-report.json; EC=$?; node -e "try{const r=require('/tmp/e2e-report.json');r.forEach(f=>f.elements&&f.elements.forEach(s=>{const bad=s.steps&&s.steps.find(st=>st.result&&st.result.status==='failed');if(bad)console.log('FAIL',s.name+':',bad.result.error_message&&bad.result.error_message.slice(0,800))}));}catch(e){}" 2>/dev/null; exit $EC

      - name: Upload Cucumber report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cucumber-e2e-report
          path: reports/cucumber.html
          retention-days: 14
