name: Build & Release

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version tag (e.g. v0.1.0). Leave empty to build only.'
        required: false
        default: ''

jobs:
  build:
    name: Build standalone bundle
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          run_install: false

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm prisma generate

      - name: Resolve release version
        id: version
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
            echo "release=true" >> "$GITHUB_OUTPUT"
          elif [[ "${{ github.event_name }}" == "workflow_dispatch" && -n "${{ github.event.inputs.version }}" ]]; then
            echo "tag=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
            echo "release=true" >> "$GITHUB_OUTPUT"
          elif [[ "${{ github.event_name }}" == "push" && "$GITHUB_REF" == refs/heads/main ]]; then
            PKG_VERSION="v$(node -p "require('./package.json').version")"
            if git rev-parse "$PKG_VERSION" >/dev/null 2>&1; then
              echo "tag=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
              echo "release=false" >> "$GITHUB_OUTPUT"
            else
              echo "tag=${PKG_VERSION}" >> "$GITHUB_OUTPUT"
              echo "release=true" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "tag=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
            echo "release=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build
        run: pnpm build
        env:
          # Only NEXT_PUBLIC_* vars are baked into the client bundle at build time.
          # All other vars (DATABASE_URL, NEXTAUTH_SECRET, etc.) are runtime-only
          # and must be present in .env.production on the server.
          NEXT_PUBLIC_BASE_URL: ${{ secrets.NEXT_PUBLIC_BASE_URL }}
          # Syntactically valid placeholder so Prisma client initialises without
          # a real DB during static analysis. No actual connection is made.
          DATABASE_URL: postgresql://placeholder:placeholder@localhost:5432/placeholder

      - name: Assemble bundle
        run: |
          # Copy static assets into standalone so it is fully self-contained
          cp -r .next/static   .next/standalone/.next/static
          cp -r public         .next/standalone/public

          # Include Prisma schema + migrations so the server can run migrate deploy
          mkdir -p .next/standalone/prisma
          cp -r prisma/schema.prisma .next/standalone/prisma/
          cp -r prisma/migrations    .next/standalone/prisma/ 2>/dev/null || true

          # Name the bundle after the resolved version tag
          VERSION="${{ steps.version.outputs.tag }}"
          tar -czf "txosnabai-${VERSION}.tar.gz" -C .next/standalone .
          echo "BUNDLE=txosnabai-${VERSION}.tar.gz" >> "$GITHUB_ENV"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: txosnabai-bundle
          path: '*.tar.gz'
          retention-days: 30

      - name: Create GitHub Release
        if: steps.version.outputs.release == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          files: '*.tar.gz'
          generate_release_notes: true
